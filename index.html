<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wedding Music Player</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<audio id="music">
  <source src="music.mp3" type="audio/mpeg" />
</audio>

<div class="container">

  <div class="card first"></div>
  <div class="card second"></div>
  <div class="card third"></div>
  <div class="card fourth"></div>
  <div class="card "></div>

  <div class="card fifth">
  
    <div class="player">
      
      <div class="progress-wrapper">
        
        <svg viewBox="0 0 120 140" class="flower-svg">

          <path
            d="M60 110 C20 80 10 40 35 25 C50 15 60 30 60 30 C60 30 70 15 85 25 C110 40 100 80 60 110 Z"
            stroke="rgba(0,0,0,0.15)"
            stroke-width="5"
            fill="none"
          />

          <path
            id="flowerProgress"
            d="M60 110 C20 80 10 40 35 25 C50 15 60 30 60 30 C60 30 70 15 85 25 C110 40 100 80 60 110 Z"
            stroke="pink"
            stroke-width="5"
            fill="none"
            stroke-linecap="round"
          />
        </svg>

        <button id="playBtn">▶</button>
      </div>

      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7"/>
      
    

    <div class="countdown-wrapper">
      <div class="card third1"></div>
      <div class="date-title">19 juni 2026</div>
      <div id="countdown"></div>
    </div>



      
    </div>
    <div class="card third2"></div>
    <div class="card sixth"></div>
    <div class="card zeventh"></div>
    <a href="https://maps.app.goo.gl/cBRbjW2cRLHypAZ7A" target="_blank" class="card eight"></a>
    <div class="card third3"></div>
    <div class="card nineth"></div>
    <div class="card tenth"></div>
    <div class="card third4"></div>
    <div class="card eleven"></div>
    <div class="card twelve"></div>
     <div class="card third5"></div>
    <div class="card thirtheen"></div>
    <div class="card fourtheen"></div>
    <div class="card fiftheen"></div>
     <div class="card third6"></div>
    <div class="card sixtheen"></div>
    <div class="card zeventeen"></div>
  </div>
</div>
      
<script src="script.js"></script>
</body>
</html>
